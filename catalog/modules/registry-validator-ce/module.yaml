id: registry-validator-ce
version: 0.1.0
category: connection-engine
description: Validates the installed System Zero registry, manifests, capabilities,
  and config.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.registry.validation
  address: events:ce.registry.validation.snapshot
  description: Validates the installed System Zero registry, manifests, capabilities,
    and config.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

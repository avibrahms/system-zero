id: registry-validator-ce
version: 0.1.0
category: connection-engine
description: Registry Validator reconstructed as a protocol-native self-improvement
  organ.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.registry.validator
  address: events:ce.registry.validator.snapshot
  description: Publishes Registry Validator reconstruction snapshots.
requires:
- providers:
  - bus
  - memory
  - discovery
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

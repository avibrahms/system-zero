id: action-card-cleanup-ce
version: 0.1.0
category: connection-engine
description: Archives completed action-card items from shared storage and removes
  them from the active card.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.action.card.cleanup
  address: events:ce.action.card.cleanup.snapshot
  description: Archives completed action-card items from shared storage and removes
    them from the active card.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

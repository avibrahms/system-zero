id: sentinel-ce
version: 0.1.0
category: connection-engine
description: Scans repository files for common secret, config, and safety findings.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.sentinel.scan
  address: events:ce.sentinel.scan.snapshot
  description: Scans repository files for common secret, config, and safety findings.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

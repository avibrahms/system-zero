id: eidetic-ce
version: 0.1.0
category: connection-engine
description: Indexes evidence-like repository documents into a compact memory map.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.eidetic.index
  address: events:ce.eidetic.index.snapshot
  description: Indexes evidence-like repository documents into a compact memory map.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

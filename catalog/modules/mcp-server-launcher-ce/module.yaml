id: mcp-server-launcher-ce
version: 0.1.0
category: connection-engine
description: Discovers MCP server definitions and produces a launch readiness plan.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.mcp.launch.plan
  address: events:ce.mcp.launch.plan.snapshot
  description: Discovers MCP server definitions and produces a launch readiness plan.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

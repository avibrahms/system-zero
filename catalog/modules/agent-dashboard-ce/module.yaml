id: agent-dashboard-ce
version: 0.1.0
category: connection-engine
description: Builds a dashboard health snapshot from generic session, action-card,
  and module state files.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.agent.dashboard
  address: events:ce.agent.dashboard.snapshot
  description: Builds a dashboard health snapshot from generic session, action-card,
    and module state files.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

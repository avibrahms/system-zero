id: start-preamble-ce
version: 0.1.0
category: connection-engine
description: Generates a compact start-preamble from current session and reference-stack
  state.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.start.preamble
  address: events:ce.start.preamble.snapshot
  description: Generates a compact start-preamble from current session and reference-stack
    state.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

id: chronicle-ce
version: 0.1.0
category: connection-engine
description: Records recent bus events into a hashed daily chronicle stream.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.chronicle
  address: events:ce.chronicle.snapshot
  description: Records recent bus events into a hashed daily chronicle stream.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

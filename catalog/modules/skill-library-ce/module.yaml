id: skill-library-ce
version: 0.1.0
category: connection-engine-skills
description: Exposes the sanitized recursive-question skill catalog as a queryable
  module.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.skill.library
  address: events:ce.skill.library.snapshot
  description: Exposes the sanitized recursive-question skill catalog as a queryable
    module.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

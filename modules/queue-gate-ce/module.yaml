id: queue-gate-ce
version: 0.1.0
category: connection-engine
description: Counts active ready-queue entries and opens or closes a content-production
  gate.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.queue.gate
  address: events:ce.queue.gate.snapshot
  description: Counts active ready-queue entries and opens or closes a content-production
    gate.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints:
  max_depth:
    default: 15
    range:
    - 0
    - 500
    description: Maximum active queue entries before the gate closes.
    mode: simple
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

id: spec-dependency-graph-ce
version: 0.1.0
category: connection-engine
description: Builds a dependency graph from phase and workflow specification documents.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.spec.dependency.graph
  address: events:ce.spec.dependency.graph.snapshot
  description: Builds a dependency graph from phase and workflow specification documents.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

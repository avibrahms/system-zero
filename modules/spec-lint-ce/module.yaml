id: spec-lint-ce
version: 0.1.0
category: connection-engine
description: Lints System Zero plan and protocol specs for required sections and stale
  placeholders.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.spec.lint
  address: events:ce.spec.lint.snapshot
  description: Lints System Zero plan and protocol specs for required sections and
    stale placeholders.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

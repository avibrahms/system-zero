id: system-zero-ce
version: 0.1.0
category: connection-engine
description: Audits the local System Zero installation and reconstructed stack readiness.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.system.zero.audit
  address: events:ce.system.zero.audit.snapshot
  description: Audits the local System Zero installation and reconstructed stack readiness.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

id: rollback-email-verification-ce
version: 0.1.0
category: connection-engine
description: Removes generic email verification artifacts from shared System Zero
  storage.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.email.verification.rollback
  address: events:ce.email.verification.rollback.snapshot
  description: Removes generic email verification artifacts from shared System Zero
    storage.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

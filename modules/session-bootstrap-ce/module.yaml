id: session-bootstrap-ce
version: 0.1.0
category: connection-engine
description: Builds a deterministic session-start payload from repo profile, git state,
  and module health.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.session.bootstrap
  address: events:ce.session.bootstrap.snapshot
  description: Builds a deterministic session-start payload from repo profile, git
    state, and module health.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic

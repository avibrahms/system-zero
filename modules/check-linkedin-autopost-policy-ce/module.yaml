id: check-linkedin-autopost-policy-ce
version: 0.1.0
category: connection-engine
description: Checks generic content auto-post policy files for stale eligibility and
  cadence language.
entry:
  type: python
  command: entry.py
  args: []
triggers:
- 'on': tick
provides:
- name: ce.content.autopost.policy
  address: events:ce.content.autopost.policy.snapshot
  description: Checks generic content auto-post policy files for stale eligibility
    and cadence language.
requires:
- providers:
  - bus
  - memory
  - discovery
  - storage
setpoints: {}
hooks:
  reconcile: reconcile.sh
  doctor: doctor.sh
limits:
  max_runtime_seconds: 60
  max_memory_mb: 128
personas:
- static
- dynamic
